[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && pnpm run typecheck:libs && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "pnpm --filter @workspace/db run push && pnpm --filter @workspace/scripts run seed:products && node artifacts/api-server/dist/index.mjs"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
