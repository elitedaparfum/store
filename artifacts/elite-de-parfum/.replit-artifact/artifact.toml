kind = "web"
previewPath = "/"
title = "Élite de Parfum"
version = "1.0.0"
id = "artifacts/elite-de-parfum"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19998

[services.development]
run = "pnpm --filter @workspace/elite-de-parfum run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/elite-de-parfum", "run", "build" ]
publicDir = "artifacts/elite-de-parfum/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19998"
BASE_PATH = "/"
